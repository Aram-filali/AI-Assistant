# ------------------------------------------------------------------------------
# ⚙️ CONFIGURATION POSTGRESQL - DEVELOPPEMENT
# ------------------------------------------------------------------------------

# --- Connexions ---
listen_addresses = '*'
max_connections = 100

# --- Mémoire (Optimisé pour Dev Local) ---
shared_buffers = 256MB                  # 25% de la RAM dédiée au conteneur (1GB)
work_mem = 16MB                         # Mémoire par opération de tri/hash
maintenance_work_mem = 64MB             # Mémoire pour vacuum/index
effective_cache_size = 768MB            # Estimation du cache OS disponible

# --- Disque & SSD ---
random_page_cost = 1.1                  # Optimisé pour SSD (défaut 4.0 pour HDD)
effective_io_concurrency = 200          # Pour SSD

# --- WAL (Write Ahead Log) ---
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# --- Logging (Debug Mode) ---
log_destination = 'stderr'
logging_collector = off                 # Docker gère les logs via stderr
log_statement = 'all'                   # LOGGUER TOUTES LES REQUÊTES (Utile en Dev)
log_duration = on
log_min_duration_statement = 0          # Tout logguer
log_timezone = 'UTC'

# --- Locale & Timezone ---
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

# --- Autres ---
default_statistics_target = 100         # Précision des stats (défaut 100)
password_encryption = scram-sha-256     # Sécurité standard
