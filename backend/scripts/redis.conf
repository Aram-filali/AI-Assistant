# ------------------------------------------------------------------------------
# 🔴 CONFIGURATION REDIS - DEVELOPPEMENT
# ------------------------------------------------------------------------------

# --- Réseau & Sécurité ---
bind 0.0.0.0
protected-mode no
port 6379
requirepass redis_password_2024

# --- Gestion Mémoire ---
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- Persistance RDB (Snapshots) ---
# Sauvegarder si :
# - 1 maj après 3600 sec (1h)
# - 100 maj après 300 sec (5 min)
# - 10000 maj après 60 sec (1 min)
save 3600 1
save 300 100
save 60 10000

# --- Persistance AOF (Append Only File) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Logging ---
loglevel notice

# --- Autres ---
databases 16
always-show-logo yes
